<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Montaureo · Lead Queue</title>
<meta name="robots" content="noindex, nofollow" />
<!--
  =====================================================================
  admin.html — Montaureo internal lead queue viewer
  ---------------------------------------------------------------------
  Calls GET /api/leads with Authorization: Bearer <password>.
  Deploy alongside the Vercel project as a static file (e.g. at the
  project root, or under /public if using a framework that serves from
  there) so it's reachable at https://yourdomain.com/admin.html or
  rewritten to /admin via vercel.json.

  SECURITY NOTES:
  - The password is kept ONLY in a JS variable in memory for this page
    session. It is never written to localStorage/sessionStorage/cookies,
    so reloading the page requires re-entering it. This is intentional —
    an admin password sitting in browser storage is a soft target.
  - This page does basic client-side rendering only; all access control
    happens server-side in /api/leads via the Bearer token check.
  - For real production use beyond internal MVP, put this behind an
    additional layer (Vercel Password Protection, SSO, IP allowlist).
  =====================================================================
-->
<style>
  :root {
    --void: #070708; --panel: #0e0f14; --panelHi: #14151c; --card: #101117;
    --line: rgba(198,163,90,0.16); --gold: #c6a35a; --goldHi: #f2dca0;
    --mist: #8a8a92; --faint: #5a5a63; --snow: #f1efe8; --green: #7fb082; --red: #e08a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--void); color: var(--snow);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 22px 60px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(140deg, var(--goldHi), var(--gold)); }
  .brand .name { font-size: 13px; letter-spacing: 0.30em; color: var(--snow); }
  .brand .sub { font-size: 11px; color: var(--faint); letter-spacing: 0.1em; margin-left: 8px; }

  .gate {
    max-width: 380px; margin: 80px auto; border: 1px solid var(--line); border-radius: 18px;
    padding: 28px 26px; background: linear-gradient(180deg, var(--panelHi), var(--panel));
  }
  .gate h1 { font-size: 18px; margin: 0 0 6px; font-weight: 600; }
  .gate p { font-size: 12.5px; color: var(--mist); margin: 0 0 18px; line-height: 1.5; }
  input[type="password"], input[type="text"], input[type="number"], select {
    width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 13px; font-size: 14px; color: var(--snow); font-family: inherit; outline: none;
  }
  input::placeholder { color: var(--faint); }
  button {
    cursor: pointer; border: none; border-radius: 10px; font-family: inherit; font-weight: 600;
  }
  .btn-primary {
    width: 100%; margin-top: 12px; padding: 12px; font-size: 14px; color: #1a1408;
    background: linear-gradient(140deg, var(--goldHi), var(--gold));
  }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }
  .btn-secondary {
    padding: 9px 14px; font-size: 12.5px; color: var(--snow); background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
  }
  .err { font-size: 12.5px; color: var(--red); margin-top: 10px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .toolbar .pill-group { display: flex; border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .toolbar .pill-group button {
    padding: 8px 16px; font-size: 12.5px; background: transparent; color: var(--mist); border-radius: 0;
  }
  .toolbar .pill-group button.active { background: linear-gradient(140deg, var(--goldHi), var(--gold)); color: #1a1408; }
  .toolbar input[type="number"] { width: 90px; }
  .toolbar .spacer { flex: 1; }
  .meta { font-size: 12px; color: var(--faint); margin-bottom: 14px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .kpi-card { border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; background: linear-gradient(180deg, var(--panelHi), var(--panel)); }
  .kpi-card .tier-label { display: flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .kpi-card .row { display: flex; justify-content: space-between; font-size: 12px; color: var(--mist); padding: 3px 0; }
  .kpi-card .row b { color: var(--snow); font-weight: 600; }
  .kpi-card.tier-RED .tier-label { color: #ff8a8a; }
  .kpi-card.tier-GOLD .tier-label { color: var(--goldHi); }
  .kpi-card.tier-PRIORITY .tier-label { color: #8fb1ff; }
  .kpi-card.tier-STANDARD .tier-label { color: var(--mist); }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th {
    text-align: left; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gold); border-bottom: 1px solid var(--line); padding: 10px 10px; white-space: nowrap;
  }
  tbody td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; }
  tbody tr:hover { background: rgba(198,163,90,0.04); }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
  .badge-RED { background: rgba(224,138,138,0.18); color: #ff8a8a; }
  .badge-GOLD { background: rgba(242,220,160,0.18); color: var(--goldHi); }
  .badge-PRIORITY { background: rgba(122,162,255,0.18); color: #8fb1ff; }
  .badge-STANDARD { background: rgba(255,255,255,0.06); color: var(--mist); }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; background: rgba(255,255,255,0.05); color: var(--mist); }
  .row-actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .row-actions button {
    padding: 5px 9px; font-size: 11px; font-weight: 600; border-radius: 7px;
    background: rgba(255,255,255,0.04); color: var(--mist); border: 1px solid var(--line);
  }
  .row-actions button:hover { color: var(--snow); border-color: rgba(198,163,90,0.4); }
  .row-actions button:disabled { opacity: 0.4; cursor: default; }
  .score { font-weight: 700; color: var(--snow); }
  .muted { color: var(--faint); }
  .name-cell { font-weight: 600; color: var(--snow); }
  .empty { text-align: center; padding: 60px 0; color: var(--mist); font-size: 13.5px; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); }
  a.mailto { color: var(--gold); text-decoration: none; }
  a.mailto:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span><span class="name">MONTAUREO</span><span class="sub">LEAD QUEUE</span></div>

  <div id="gate" class="gate">
    <h1>Admin access</h1>
    <p>Enter the admin password to view the Private Consultation lead queue. The password is kept in memory only for this session — it is not stored in the browser.</p>
    <input id="password" type="password" placeholder="Admin password" autocomplete="off" />
    <button id="signin" class="btn-primary">Sign in</button>
    <div id="gateErr" class="err" style="display:none;"></div>
  </div>

  <div id="app" style="display:none;">
    <div class="toolbar">
      <div class="pill-group">
        <button id="q-all" class="active">All</button>
        <button id="q-RED">🔴 RED</button>
        <button id="q-GOLD">🟡 GOLD</button>
        <button id="q-PRIORITY">🔵 PRIORITY</button>
        <button id="q-STANDARD">⚪ STANDARD</button>
      </div>
      <input id="limit" type="number" min="1" max="200" value="50" title="Limit" />
      <button id="refresh" class="btn-secondary">Refresh</button>
      <button id="export" class="btn-secondary">Export CSV</button>
      <div class="spacer"></div>
      <button id="signout" class="btn-secondary">Sign out</button>
    </div>
    <div id="kpiHost" class="kpi-grid"></div>
    <div id="meta" class="meta"></div>
    <div id="tableHost"></div>
  </div>
</div>

<script>
(function () {
  var password = null; // kept only in memory, never persisted
  var queue = "all";

  var gate = document.getElementById("gate");
  var app = document.getElementById("app");
  var gateErr = document.getElementById("gateErr");
  var passwordInput = document.getElementById("password");

  function showGateError(msg) {
    gateErr.textContent = msg;
    gateErr.style.display = "block";
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString(); } catch { return iso; }
  }

  function renderKpi(kpi) {
    var host = document.getElementById("kpiHost");
    if (!kpi) { host.innerHTML = ""; return; }
    var tierEmoji = { RED: "🔴", GOLD: "🟡", PRIORITY: "🔵", STANDARD: "⚪" };
    var html = ["RED", "GOLD", "PRIORITY", "STANDARD"].map(function (tier) {
      var k = kpi[tier] || {};
      var avg = k.avgResponseMinutes != null ? k.avgResponseMinutes + " min" : "—";
      var pct = k.withinSlaPct != null ? k.withinSlaPct + "%" : "—";
      return (
        '<div class="kpi-card tier-' + tier + '">' +
        '<div class="tier-label">' + tierEmoji[tier] + " " + tier + " · SLA " + (k.slaMinutes != null ? k.slaMinutes + "m" : "—") + "</div>" +
        '<div class="row"><span>Avg response</span><b>' + avg + "</b></div>" +
        '<div class="row"><span>Within SLA</span><b>' + pct + "</b></div>" +
        '<div class="row"><span>Open (new)</span><b>' + (k.openLeads != null ? k.openLeads : "—") + "</b></div>" +
        '<div class="row"><span>Contacted</span><b>' + (k.contactedLeads != null ? k.contactedLeads : "—") + "</b></div>" +
        "</div>"
      );
    }).join("");
    host.innerHTML = html;
  }

  async function fetchLeads() {
    var limit = document.getElementById("limit").value || 50;
    var meta = document.getElementById("meta");
    var host = document.getElementById("tableHost");
    meta.textContent = "Loading…";
    host.innerHTML = "";

    try {
      var res = await fetch("/api/leads?queue=" + encodeURIComponent(queue) + "&limit=" + encodeURIComponent(limit), {
        headers: { "Authorization": "Bearer " + password }
      });

      if (res.status === 401) {
        // Password became invalid mid-session — force a fresh sign-in.
        password = null;
        app.style.display = "none";
        gate.style.display = "block";
        showGateError("Session expired or incorrect password. Please sign in again.");
        return;
      }

      if (!res.ok) {
        meta.textContent = "";
        host.innerHTML = '<div class="empty">Could not load leads (server error). Please try again.</div>';
        return;
      }

      var data = await res.json();
      var leads = data.leads || [];
      renderKpi(data.kpi);
      meta.textContent = leads.length + " lead" + (leads.length === 1 ? "" : "s") + " · queue: " + queue;

      if (leads.length === 0) {
        host.innerHTML = '<div class="empty">No leads in this queue yet.</div>';
        return;
      }

      var rows = leads.map(function (l) {
        var prioClass = "badge-" + (l.priority || "STANDARD");
        var utm = [l.utm_source, l.utm_medium, l.utm_campaign].filter(Boolean).join(" / ") || "—";
        var status = l.status || "new";
        var leadId = escapeHtml(l.id || "");
        var actions = "";
        if (l.id) {
          if (status === "new") actions += '<button data-id="' + leadId + '" data-status="contacted">Mark contacted</button>';
          if (status === "contacted") actions += '<button data-id="' + leadId + '" data-status="qualified">Mark qualified</button>';
          if (status === "qualified" || status === "contacted") actions += '<button data-id="' + leadId + '" data-status="closed">Close</button>';
        }
        return (
          "<tr>" +
          '<td class="score">' + (l.score != null ? l.score : "—") + "</td>" +
          '<td><span class="badge ' + prioClass + '">' + escapeHtml(l.priority || "—") + "</span></td>" +
          '<td><span class="status-badge">' + escapeHtml(status) + "</span></td>" +
          "<td>" + escapeHtml(l.advisor || "—") + "</td>" +
          '<td class="name-cell">' + escapeHtml(l.name || "—") + "</td>" +
          '<td><a class="mailto" href="mailto:' + escapeHtml(l.email || "") + '">' + escapeHtml(l.email || "—") + "</a></td>" +
          "<td>" + escapeHtml(l.phone || "—") + "</td>" +
          "<td>" + escapeHtml(l.goal || "—") + "</td>" +
          "<td>" + escapeHtml(l.time || "—") + "</td>" +
          "<td>" + escapeHtml(l.lang || "—") + "</td>" +
          "<td>" + escapeHtml(l.moveCountry || "—") + "</td>" +
          '<td class="muted">' + escapeHtml(utm) + "</td>" +
          '<td class="muted">' + fmtDate(l.createdAt || l.receivedAt) + "</td>" +
          '<td class="muted">' + fmtDate(l.firstContactAt) + "</td>" +
          '<td class="row-actions">' + (actions || '<span class="muted">—</span>') + "</td>" +
          "</tr>"
        );
      }).join("");

      host.innerHTML =
        '<div class="table-wrap"><table><thead><tr>' +
        "<th>Score</th><th>Tier</th><th>Status</th><th>Advisor</th><th>Name</th><th>Email</th><th>Phone</th>" +
        "<th>Goal</th><th>Best time</th><th>Lang</th><th>Move country</th><th>UTM</th><th>Created</th><th>First contact</th><th>Actions</th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table></div>";

      host.querySelectorAll(".row-actions button").forEach(function (btn) {
        btn.addEventListener("click", function () {
          updateLeadStatus(btn.getAttribute("data-id"), btn.getAttribute("data-status"), btn);
        });
      });
    } catch (e) {
      meta.textContent = "";
      host.innerHTML = '<div class="empty">Connection error. Please check your network and try again.</div>';
    }
  }

  async function updateLeadStatus(id, status, btn) {
    if (!id || !status) return;
    var row = btn ? btn.closest("tr") : null;
    if (btn) btn.disabled = true;
    try {
      var res = await fetch("/api/lead-status", {
        method: "PATCH",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + password },
        body: JSON.stringify({ id: id, status: status }),
      });

      if (res.status === 401) {
        password = null;
        app.style.display = "none";
        gate.style.display = "block";
        showGateError("Session expired or incorrect password. Please sign in again.");
        return;
      }

      if (!res.ok) {
        if (row) row.style.outline = "1px solid var(--red)";
        if (btn) btn.disabled = false;
        return;
      }

      // Re-pull the queue so status, firstContactAt and the action buttons reflect reality.
      fetchLeads();
    } catch (e) {
      if (row) row.style.outline = "1px solid var(--red)";
      if (btn) btn.disabled = false;
    }
  }

  var TIERS = ["all", "RED", "GOLD", "PRIORITY", "STANDARD"];

  function setQueue(q) {
    queue = q;
    TIERS.forEach(function (tier) {
      var btn = document.getElementById("q-" + tier);
      if (btn) btn.classList.toggle("active", tier === q);
    });
    fetchLeads();
  }

  document.getElementById("signin").addEventListener("click", function () {
    var val = passwordInput.value.trim();
    if (!val) { showGateError("Please enter the password."); return; }
    password = val;
    gateErr.style.display = "none";
    gate.style.display = "none";
    app.style.display = "block";
    fetchLeads();
  });

  passwordInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") document.getElementById("signin").click();
  });

  document.getElementById("signout").addEventListener("click", function () {
    password = null;
    passwordInput.value = "";
    app.style.display = "none";
    gate.style.display = "block";
    gateErr.style.display = "none";
  });

  TIERS.forEach(function (tier) {
    var btn = document.getElementById("q-" + tier);
    if (btn) btn.addEventListener("click", function () { setQueue(tier); });
  });
  document.getElementById("refresh").addEventListener("click", fetchLeads);
  document.getElementById("limit").addEventListener("change", fetchLeads);

  document.getElementById("export").addEventListener("click", async function () {
    var btn = document.getElementById("export");
    var limit = document.getElementById("limit").value || 1000;
    btn.disabled = true;
    var originalLabel = btn.textContent;
    btn.textContent = "Exporting…";
    try {
      var res = await fetch("/api/leads-export?queue=" + encodeURIComponent(queue) + "&limit=" + encodeURIComponent(limit), {
        headers: { "Authorization": "Bearer " + password }
      });

      if (res.status === 401) {
        password = null;
        app.style.display = "none";
        gate.style.display = "block";
        showGateError("Session expired or incorrect password. Please sign in again.");
        return;
      }
      if (!res.ok) {
        alert("Could not export leads (server error). Please try again.");
        return;
      }

      var blob = await res.blob();
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "montaureo-leads-" + queue + "-" + new Date().toISOString().slice(0, 10) + ".csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      alert("Connection error during export. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = originalLabel;
    }
  });
})();
</script>
</body>
</html>
